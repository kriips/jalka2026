name: Deploy

on:
  # Auto-deploy once the CI workflow finishes successfully on master.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  # Allow manual deploys from the GitHub "Actions" tab (works from a browser/iPad).
  workflow_dispatch:

# Never run two production deploys at the same time.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # Manual runs always proceed; automatic runs only when CI passed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # For an automatic run, deploy the exact commit CI validated.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Builds on Fly's remote builders, so no Docker is needed on the runner.
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
